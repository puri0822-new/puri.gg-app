name: Deploy Presentation

on:
  push:
    branches:
      - main
    paths:
      - 'presentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: GitHub Pages 배포
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: presentation/ 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: presentation/

      - name: 배포
        id: deployment
        uses: actions/deploy-pages@v4
